<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Carga de archivo Excel</title>

    <style>

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fb;
            margin: 0;
            padding: 0;
        }

        /* ===== CABECERA ===== */
        .header {
            width: 100%;
            background: linear-gradient(to right, #32266b);
            padding-top: 5px;
        }

        /* FILA SUPERIOR */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .logo-izq, .logo-der {
            height: 55px;
        }

        /* FILA INFERIOR (banner centrado) */
        .header-center {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0 10px 0;
        }

        .logo-centro {
            height: 70px;
        }

        /* ===== CONTENIDO ===== */
        .container {
            max-width: 600px;
            margin: 120px auto 100px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .titulo-sistema {
            text-align: center;
            color: #005aa7;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px solid #005aa7;
            padding-bottom: 10px;
        }

        h2 {
            text-align: center;
            color: #5a6c7d;
            font-size: 15px;
            font-weight: bold;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        input[type="file"] {
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 100%;
        }

        button {
            padding: 10px 25px;
            background-color: #0065b7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #004a87;
        }

        .resultado {
            margin-top: 25px;
            background-color: #eef2f7;
            padding: 15px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-family: monospace;
        }

        /* ===== FOOTER ===== */
        .footer {
            width: 100%;
            position: fixed;
            bottom: 0;
            background: #ffffff;
            border-top: 2px solid #ddd;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 20px;
        }

        .footer img {
            height: 35px;
        }

        .footer-text {
            font-size: 12px;
            color: #333;
        }

        /* ===== BANDERA ECUADOR ===== */
        .bandera {
            width: 100%;
            height: 4px;
            display: flex;
        }

        .amarillo {
            background-color: #fcd116;
            flex: 2;
        }

        .azul {
            background-color: #003893;
            flex: 1;
        }

        .rojo {
            background-color: #ce1126;
            flex: 1;
        }

    </style>
</head>

<body>

<!-- ===== CABECERA ===== -->
<header class="header">

    <!-- FILA SUPERIOR -->
    <div class="header-top">
        <img src="/images/iece_logo_r1_c1.png" class="logo-izq">
        <img src="/images/iece_logo_r1_c3.png" class="logo-der">
    </div>

    <!-- FILA INFERIOR -->
    <div class="header-center">
        <img src="/images/banner_centro.png" class="logo-centro">
    </div>

</header>

<!-- ===== CONTENIDO ===== -->
<div class="container">

    <h1 class="titulo-sistema">Postulación - Carga masiva de información</h1>
    <h2>Subida de archivo Excel</h2>

    <form method="post" enctype="multipart/form-data" action="/upload">
        <input type="file" name="file" accept=".xlsx" required
            onchange="limpiarResultado()" />
        <button type="submit">Subir y Procesar</button>
    </form>

    <div id="resultadoDiv" class="resultado" th:if="${resultado}">
        <h4>Resultado:</h4>
        <div th:text="${resultado}"></div>

        <form method="get" action="/">
            <button type="submit">Limpiar</button>
        </form>
    </div>
</div>

<script>
    function limpiarResultado() {
        const resultado = document.getElementById('resultadoDiv');
        if (resultado) {
            resultado.style.display = 'none';
        }
    }
</script>

<!-- ===== FOOTER ===== -->
<footer class="footer">
    <div class="footer-content">
        <img src="/images/logo_presidencia.png">
        <div class="footer-text">
            www.educacionsuperior.gob.ec
        </div>
    </div>

    <div class="bandera">
        <div class="amarillo"></div>
        <div class="azul"></div>
        <div class="rojo"></div>
    </div>
</footer>

</body>
</html>
